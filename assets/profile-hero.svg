<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Adarsha Chatterjee GitHub profile banner</title>
  <desc id="desc">A dark product engineering banner for Adarsha Chatterjee, AI product engineer and full-stack builder.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="0.46" stop-color="#101827"/>
      <stop offset="1" stop-color="#06151b"/>
    </linearGradient>
    <linearGradient id="accent" x1="118" y1="52" x2="1039" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#facc15"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#0d1823" stop-opacity="0.92"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#253044" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-10%" y="-20%" width="120%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="26" fill="url(#surface)"/>
  <rect width="1200" height="420" rx="26" fill="url(#grid)" opacity="0.64"/>
  <path d="M0 344C106 300 203 320 318 281C457 234 496 137 630 142C783 148 812 287 974 260C1073 244 1128 181 1200 154V420H0V344Z" fill="#0f766e" opacity="0.16"/>
  <path d="M69 66C202 24 325 39 461 78C598 118 694 65 832 53C962 42 1088 61 1161 108" stroke="url(#accent)" stroke-opacity="0.42" stroke-width="2"/>

  <g filter="url(#soft)">
    <rect x="70" y="58" width="1060" height="304" rx="24" fill="url(#card)" stroke="#334155"/>
    <rect x="92" y="80" width="1016" height="260" rx="18" stroke="url(#accent)" stroke-opacity="0.34"/>
  </g>

  <g transform="translate(130 113)">
    <rect x="0" y="0" width="196" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
    <circle cx="22" cy="17" r="6" fill="#2dd4bf"/>
    <text x="38" y="22" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Open to product roles</text>

    <text x="0" y="91" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">Adarsha Chatterjee</text>
    <text x="1" y="132" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">AI Product Engineer / Full-stack Builder</text>
    <text x="1" y="171" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Fintech intelligence, learning platforms, operator tools, and native macOS AI workflows.</text>

    <g transform="translate(0 211)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
      <rect x="0" y="0" width="142" height="34" rx="17" fill="#172554" stroke="#2563eb"/>
      <text x="18" y="22" fill="#dbeafe">TypeScript</text>
      <rect x="154" y="0" width="108" height="34" rx="17" fill="#052e2b" stroke="#0f766e"/>
      <text x="172" y="22" fill="#ccfbf1">FastAPI</text>
      <rect x="274" y="0" width="88" height="34" rx="17" fill="#431407" stroke="#f97316"/>
      <text x="292" y="22" fill="#ffedd5">Swift</text>
      <rect x="374" y="0" width="118" height="34" rx="17" fill="#422006" stroke="#eab308"/>
      <text x="392" y="22" fill="#fef9c3">Gemini</text>
    </g>
  </g>

  <g transform="translate(812 94)">
    <rect x="0" y="0" width="242" height="212" rx="22" fill="#0b1220" stroke="#334155"/>
    <text x="28" y="44" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Product Surface</text>
    <text x="28" y="75" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">ship useful systems, not demos</text>

    <circle cx="62" cy="126" r="22" fill="#1d4ed8"/>
    <circle cx="124" cy="126" r="22" fill="#0f766e"/>
    <circle cx="186" cy="126" r="22" fill="#ca8a04"/>
    <path d="M84 126H102M146 126H164" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M62 104V83M124 104V88M186 104V80" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <circle cx="62" cy="83" r="5" fill="#58a6ff"/>
    <circle cx="124" cy="88" r="5" fill="#2dd4bf"/>
    <circle cx="186" cy="80" r="5" fill="#facc15"/>

    <text x="28" y="176" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Evidence-first AI / clean UX / deployed builds</text>
  </g>
